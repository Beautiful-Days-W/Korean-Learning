<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숙제 · Homework</title>
<style>
  :root{--bg:#f6f7f9;--card:#fff;--ink:#1f2328;--muted:#6b7280;--line:#e5e7eb;--accent:#2563eb;--accent-soft:#eff4ff;--ok:#0d9488;--warm:#9a3412;--warm-soft:#fff7ed;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.65;
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",-apple-system,system-ui,sans-serif;}
  .wrap{max-width:720px;margin:0 auto;padding:40px 20px 90px;}
  header{text-align:center;margin-bottom:28px;}
  header h1{font-size:26px;margin:0 0 6px;}
  header p{color:var(--muted);font-size:14.5px;margin:0;}
  a.home{display:inline-block;margin-bottom:18px;color:var(--accent);text-decoration:none;font-size:13.5px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px;}
  .card h2{font-size:17px;margin:0 0 4px;display:flex;align-items:baseline;gap:8px;}
  .card h2 .en{font-size:12.5px;color:var(--muted);font-weight:500;}
  .card p.lead{font-size:14px;color:#374151;margin:4px 0 14px;}
  label{display:block;font-size:13px;font-weight:600;color:#374151;margin:12px 0 5px;}
  select,input,textarea{font:inherit;width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;}
  textarea{min-height:150px;resize:vertical;line-height:1.7;}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--accent);background:var(--accent-soft);}
  .btn{font:inherit;font-size:15px;font-weight:700;cursor:pointer;border:none;border-radius:999px;padding:12px 22px;margin-top:16px;background:var(--accent);color:#fff;}
  .btn:disabled{opacity:.5;cursor:default;}
  .msg{margin-top:12px;font-size:14px;font-weight:600;}
  .msg.ok{color:var(--ok);} .msg.no{color:#dc2626;}
  .sub{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  .subhead{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:13px 16px;cursor:pointer;user-select:none;}
  .subhead:hover{background:#fafbff;}
  .subhead .caret{color:var(--muted);font-size:12px;width:12px;display:inline-block;transition:transform .15s;}
  .sub.open .subhead .caret{transform:rotate(90deg);}
  .sub .ttl{font-size:15px;font-weight:700;}
  .sub .when{font-size:12.5px;color:var(--muted);margin-left:auto;}
  .badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;white-space:nowrap;}
  .badge.done{color:#fff;background:var(--warm);}
  .badge.wait{color:#6b7280;background:#eef0f2;}
  .badge.exam{color:#fff;background:var(--accent);}
  .subbody{display:none;padding:0 16px 14px;}
  .sub.open .subbody{display:block;}
  .sub .text{white-space:pre-wrap;font-size:14.5px;margin:2px 0 0;padding:10px 12px;background:#fafafa;border-radius:8px;}
  .fb{margin-top:12px;border-left:3px solid var(--warm);background:var(--warm-soft);border-radius:0 8px 8px 0;padding:10px 14px;}
  .fb .lab{font-size:12px;font-weight:700;color:var(--warm);margin-bottom:4px;}
  .fb .body{white-space:pre-wrap;font-size:14px;color:#3f2a1d;}
  .fb .fix{color:#1d4ed8;}
  .fb .meta{font-size:11.5px;color:var(--muted);margin-top:6px;}
  .nofb{margin-top:10px;font-size:13px;color:var(--muted);}
  .empty{color:var(--muted);text-align:center;padding:26px 0;font-size:14px;}
  footer{text-align:center;color:var(--muted);font-size:12.5px;margin-top:26px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="home" href="index.html">← 수업 홈</a>
  <header>
    <h1>숙제 📝</h1>
    <p>숙제를 제출하면 선생님이 확인하고 첨삭해 드려요. 첨삭은 아래에서 다시 볼 수 있어요.</p>
  </header>

  <div class="card">
    <h2>숙제 제출 <span class="en">Submit homework</span></h2>
    <label for="name">이름 <span style="font-weight:400;color:var(--muted)">Name</span></label>
    <input id="name" value="" placeholder="이름">
    <label for="lesson">레슨 <span style="font-weight:400;color:var(--muted)">Lesson</span></label>
    <select id="lesson">
      <option>Lesson 1 · 을/를</option>
      <option>Lesson 2 · 형용사 묘사</option>
      <option>Lesson 3 · 비교·의견</option>
      <option>Lesson 4 · 간접화법</option>
      <option>Lesson 5 · 높임말</option>
      <option>Lesson 6 · 부탁·명령·높임</option>
      <option>Lesson 7 · 정중 부탁·권유</option>
      <option>Lesson 8 · 약속·일정 조율</option>
      <option>Lesson 9 · 기간 세기·기한 연장</option>
      <option>Lesson 10 · 가다/오다</option>
      <option>Lesson 11 · 문장 잇기(-았다가)</option>
      <option>기타 · Other</option>
    </select>
    <label for="text">숙제 내용 <span style="font-weight:400;color:var(--muted)">Your homework</span></label>
    <textarea id="text"></textarea>
    <button class="btn" id="submitBtn" onclick="submitHw()">✅ 제출하기</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="card" id="histhead" style="background:none;border:none;padding:0 2px;margin-bottom:6px;">
    <h2>내 지난 숙제 + 첨삭 <span class="en">Your homework &amp; feedback</span></h2>
  </div>
  <div id="list"><div class="empty">불러오는 중…</div></div>

  <footer>songfamily.work · 숙제</footer>
</div>
<script>
const API_BASE="https://korean.songfamily.work";
function esc(s){return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtWhen(iso){ if(!iso) return ""; return iso.replace("T"," ").slice(0,16); }

async function submitHw(){
  const name=document.getElementById("name").value.trim();
  const lesson=document.getElementById("lesson").value;
  const text=document.getElementById("text").value.trim();
  const msg=document.getElementById("msg"), btn=document.getElementById("submitBtn");
  if(!text){ msg.className="msg no"; msg.textContent="숙제 내용을 적어 주세요."; return; }
  btn.disabled=true; msg.className="msg"; msg.textContent="제출 중…";
  try{
    const res=await fetch(API_BASE+"/api/submit",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ kind:"homework", title:lesson+" 숙제", learner_name:name||null, payload:{ lesson, text } })});
    if(res.ok){ msg.className="msg ok"; msg.textContent="✅ 제출됐어요! 선생님이 확인하면 아래에 첨삭이 달려요."; document.getElementById("text").value=""; load(); }
    else { msg.className="msg no"; msg.textContent="제출 실패: "+res.status; }
  }catch(e){ msg.className="msg no"; msg.textContent="오류: "+e; }
  btn.disabled=false;
}
async function load(){
  const list=document.getElementById("list");
  try{
    const res=await fetch(API_BASE+"/api/homework");
    if(!res.ok){ list.innerHTML=`<div class="empty">불러오기 실패: ${res.status}</div>`; return; }
    const rows=await res.json();
    if(!rows.length){ list.innerHTML=`<div class="empty">아직 제출한 숙제가 없어요.</div>`; return; }
    list.innerHTML=rows.map((r,i)=>{
      const p=r.payload||{};
      const fb=r.feedback;
      const done = !!(fb && fb.comment);
      const isExam = r.kind==='assessment';
      const examBadge = isExam ? `<span class="badge exam">평가</span>` : ``;
      const bodyMain = isExam
        ? `<div class="text">📊 문법 ${esc(p['점수(문법)']||'')}</div>`
        : `<div class="text">${esc(p.text||"")}</div>`;
      const badge = done
        ? `<span class="badge done">✍️ 첨삭</span>`
        : `<span class="badge wait">⏳ 대기</span>`;
      const fbHtml = done
        ? `<div class="fb"><div class="lab">✍️ 선생님 첨삭</div><div class="body">${esc(fb.comment).replace(/\*\*([^*]+)\*\*/g,'<span class="fix">$1</span>')}</div><div class="meta">${esc(fb.by||"teacher")} · ${esc(fmtWhen(fb.at))}</div></div>`
        : `<div class="nofb">⏳ 아직 첨삭 전이에요.</div>`;
      return `<div class="sub${i===0?" open":""}">
        <div class="subhead" onclick="this.closest('.sub').classList.toggle('open')">
          <span class="caret">▶</span>
          <span class="ttl">${esc(r.title||"숙제")}</span>
          ${examBadge}
          <span class="when">${esc(fmtWhen(r.created_at))}</span>
          ${badge}
        </div>
        <div class="subbody">
          ${bodyMain}
          ${fbHtml}
        </div>
      </div>`;
    }).join("");
  }catch(e){ list.innerHTML=`<div class="empty">${esc(e)}</div>`; }
}
// 공개 미러(github.io)에서는 제출 폼만 보이고, 제출된 답안·첨삭은 숨김(개인정보 보호).
// 집 서버(songfamily.work)에서는 학습자가 자기 첨삭을 그대로 봄.
if(location.hostname.endsWith("github.io")){
  document.getElementById("histhead").style.display="none";
  document.getElementById("list").style.display="none";
} else {
  load();
}
</script>
</body>
</html>
